<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>סקר הוועדה לקידום נשים בספורט</title>
  <style>
    :root {
      --navy:#081B3F;
      --blue:#2878B8;
      --purple:#8B4DFF;
      --magenta:#D95CEB;
      --text:#1F2933;
      --muted:#667085;
      --white:#ffffff;
      --shadow:0 18px 45px rgba(22,58,95,.14);
      --radius:28px;
    }
    * { box-sizing:border-box; }
    body, button, h1, h2, h3 {
      font-family:"Heebo","Assistant",Arial,"Helvetica Neue",sans-serif;
    }
    body {
      margin:0;
      background:
        radial-gradient(circle at 12% 4%, rgba(217,92,235,.34), transparent 28%),
        radial-gradient(circle at 86% 10%, rgba(40,120,184,.30), transparent 30%),
        linear-gradient(135deg, #050B24 0%, #081B3F 42%, #101B54 72%, #32115E 100%);
      color:var(--text);
      min-height:100vh;
      overflow-x:hidden;
    }
    .page {
      width:min(1180px, 92vw);
      margin:0 auto;
      padding:16px 0 24px;
    }
    .hero {
      min-height:auto;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .hero-card {
      width:100%;
      background:rgba(255,255,255,.92);
      border:1px solid rgba(255,255,255,.72);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      backdrop-filter:blur(10px);
    }
    .banner-wrap {
      background:linear-gradient(90deg, rgba(8,27,63,.16), rgba(139,77,255,.14), rgba(217,92,235,.10));
      padding:12px;
    }
    .banner {
      width:100%;
      max-height:205px;
      object-fit:cover;
      object-position:center;
      display:block;
      border-radius:18px;
      box-shadow:0 12px 30px rgba(22,58,95,.12);
    }
    .hero-content {
      padding:22px 38px 14px;
    }
    .hero-main {
      max-width:980px;
      margin:0 auto;
      text-align:center;
    }
    .eyebrow {
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 14px;
      border-radius:999px;
      background:linear-gradient(90deg, rgba(139,77,255,.14), rgba(217,92,235,.14));
      color:var(--navy);
      font-weight:700;
      font-size:14px;
      margin-bottom:12px;
    }
    h1 {
      margin:0 0 12px;
      color:var(--navy);
      font-size:clamp(30px, 3.5vw, 44px);
      line-height:1.05;
      letter-spacing:-.8px;
    }
    .lead {
      margin:0 auto;
      color:#3B4754;
      font-size:17px;
      line-height:1.45;
      max-width:900px;
    }
    .hero-actions {
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      justify-content:center;
      margin-top:16px;
    }
    button, .button {
      appearance:none;
      border:0;
      cursor:pointer;
      font-weight:800;
      font-size:15px;
      border-radius:999px;
      padding:12px 22px;
      transition:.25s ease;
    }
    .primary {
      background:linear-gradient(135deg, var(--navy), var(--purple), var(--magenta));
      color:white;
      box-shadow:0 12px 24px rgba(40,120,184,.26);
    }
    .primary:hover { transform:translateY(-2px); }
    .ghost {
      background:#FFFFFF;
      color:var(--navy);
      border:1px solid rgba(22,58,95,.16);
    }
    .home-button {
      background:rgba(255,255,255,.16);
      color:#FFFFFF;
      border:1px solid rgba(255,255,255,.30);
      box-shadow:none;
      padding:12px 20px;
      font-size:15px;
    }
    .stats-preview {
      display:grid;
      grid-template-columns:repeat(2, minmax(220px, 300px));
      justify-content:center;
      gap:18px;
      padding:8px 38px 24px;
    }
    .mini-stat {
      position:relative;
      isolation:isolate;
      overflow:hidden;
      min-height:92px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      background:
        radial-gradient(circle at top right, rgba(217,92,235,.24), transparent 34%),
        linear-gradient(145deg, rgba(255,255,255,.98), rgba(241,236,255,.88));
      border:1px solid rgba(22,58,95,.11);
      border-radius:22px;
      padding:16px 20px;
      box-shadow:0 16px 34px rgba(22,58,95,.12);
    }
    .mini-number {
      color:var(--navy);
      font-size:34px;
      font-weight:900;
      line-height:1;
      letter-spacing:-1px;
      margin-bottom:6px;
    }
    .mini-label {
      color:#3B4754;
      font-size:15px;
      font-weight:800;
      line-height:1.45;
    }
    .survey-section { display:none; }
    .survey-section.active { display:block; }
    .survey-shell {
      background:
        radial-gradient(circle at 18% 0%, rgba(217,92,235,.20), transparent 34%),
        radial-gradient(circle at 88% 10%, rgba(40,120,184,.18), transparent 36%),
        linear-gradient(135deg, rgba(31,49,92,.92), rgba(49,37,91,.90));
      border:1px solid rgba(255,255,255,.24);
      border-radius:32px;
      padding:18px;
      box-shadow:0 24px 60px rgba(0,0,0,.22);
      backdrop-filter:blur(8px);
    }
    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin:6px 0 14px;
    }
    .progress-wrap {
      flex:1;
      height:12px;
      background:rgba(255,255,255,.24);
      border-radius:999px;
      overflow:hidden;
    }
    .progress {
      height:100%;
      width:0%;
      background:linear-gradient(90deg, var(--magenta), var(--purple), var(--blue));
      border-radius:999px;
      transition:width .35s ease;
    }
    .counter {
      color:#FFFFFF;
      font-weight:800;
      white-space:nowrap;
    }
    .slide-card {
      min-height:auto;
      background:rgba(255,255,255,.96);
      border:1px solid rgba(255,255,255,.42);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      display:grid;
      grid-template-columns:0.9fr 1.1fr;
    }
    .question-panel {
      padding:24px;
      background:
        radial-gradient(circle at top right, rgba(217,92,235,.18), transparent 38%),
        linear-gradient(180deg, rgba(241,236,255,.98), rgba(255,255,255,.98));
      border-left:1px solid rgba(22,58,95,.10);
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      gap:16px;
    }
    .tag {
      display:inline-block;
      align-self:flex-start;
      padding:6px 12px;
      border-radius:999px;
      background:rgba(139,77,255,.10);
      color:var(--purple);
      font-weight:800;
      font-size:13px;
      margin-bottom:10px;
    }
    .question {
      margin:0;
      color:var(--navy);
      font-size:clamp(22px, 2.3vw, 30px);
      line-height:1.18;
    }
    .insight {
      background:#fff;
      border-radius:18px;
      padding:14px 16px;
      color:#344054;
      line-height:1.45;
      font-size:14.5px;
      border:1px solid rgba(22,58,95,.08);
    }
    .insight-title {
      font-size:16px;
      font-weight:900;
      color:#081B3F;
      margin-bottom:8px;
    }
    .answer-panel {
      padding:24px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:14px;
      min-width:0;
    }
    .chart-title {
      margin:0;
      color:var(--navy);
      font-size:19px;
    }
    .response-count {
      margin-top:-8px;
      color:var(--muted);
      font-size:14px;
      font-weight:700;
    }
    .bars, .stacked-bars { display:grid; gap:11px; max-height:520px; overflow:auto; padding-left:4px; }
    .bar-row, .stacked-row { display:grid; gap:6px; }
    .bar-meta, .stacked-meta {
      display:flex;
      justify-content:space-between;
      gap:12px;
      color:#344054;
      font-weight:800;
      font-size:14px;
    }
    .bar-track, .stacked-track {
      height:18px;
      background:#F0ECFF;
      border-radius:999px;
      overflow:hidden;
      box-shadow:inset 0 0 0 1px rgba(22,58,95,.05);
    }
    .bar-fill {
      height:100%;
      width:0%;
      border-radius:999px;
      background:linear-gradient(90deg, var(--purple), var(--magenta));
      transition:width 1s cubic-bezier(.2,.8,.2,1);
    }
    .stacked-track { display:flex; direction:rtl; height:22px; }
    .stack-segment {
      height:100%;
      min-width:3px;
      transition:width 1s cubic-bezier(.2,.8,.2,1);
    }
    .legend {
      display:flex;
      flex-wrap:wrap;
      gap:8px 14px;
      font-size:12px;
      color:#475467;
      margin-top:2px;
    }
    .legend-item { display:flex; align-items:center; gap:5px; }
    .legend-color {
      width:12px;
      height:12px;
      border-radius:4px;
      display:inline-block;
    }
    .quote-grid {
      display:grid;
      gap:12px;
      max-height:520px;
      overflow:auto;
      padding-left:4px;
    }
    .quote {
      background:linear-gradient(135deg, #FFFFFF, #F7FBFF);
      border:1px solid rgba(22,58,95,.10);
      border-radius:18px;
      padding:15px;
      line-height:1.55;
      color:#344054;
      box-shadow:0 10px 22px rgba(22,58,95,.07);
      font-size:14px;
    }
    .quote::before {
      content:'״';
      color:var(--blue);
      font-size:28px;
      font-weight:900;
      line-height:0;
    }
    .navigation {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      margin-top:14px;
      width:100%;
    }
    .dots { display:none !important; }
    @media (max-width:900px) {
      .slide-card { grid-template-columns:1fr; }
      .question-panel { border-left:0; border-bottom:1px solid rgba(22,58,95,.10); }
      .stats-preview { grid-template-columns:1fr; padding:0 26px 30px; }
      .hero-content, .question-panel, .answer-panel { padding:22px; }
      .topbar { align-items:stretch; flex-direction:column; }
      .progress-wrap { width:100%; }
      .home-button { align-self:flex-start; }
    }

    /* Updates requested by Oryah */
    #nextBtn {
      margin-right:auto !important;
    }
    #prevBtn {
      margin-left:0 !important;
    }

    /* Zero percent answers - show the label but without a purple progress indicator */
    .bar-row.zero-row .bar-track {
      background:#F3F4F6 !important;
      box-shadow:inset 0 0 0 1px rgba(22,58,95,.06);
    }
    .bar-row.zero-row .bar-fill {
      width:0 !important;
      opacity:0 !important;
    }

    /* Q2 ranked chart scroll tuning: show 6 items, scroll starts before item 7 */
    .ranked-bars {
      display:grid;
      gap: 10px;
      max-height: 360px;
      overflow:auto;
      padding-left:4px;
    }
    .ranked-row {
      display:grid;
      gap: 6px;
    }
    .ranked-meta {
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:14px;
      color:#344054;
      font-weight:800;
      font-size:14px;
    }
    .ranked-label {
      color:#344054;
      font-weight:900;
      line-height:1.25;
    }
    .ranked-score {
      color:var(--navy);
      font-weight:900;
      white-space:nowrap;
      font-size:15px;
    }
    .ranked-sub {
      color:#667085;
      font-size:12px;
      font-weight:700;
      margin-top:2px;
      line-height:1.25;
    }
    .ranked-track {
      height: 18px;
      background:#EEF2F7;
      border-radius:999px;
      overflow:hidden;
      box-shadow:inset 0 0 0 1px rgba(22,58,95,.06);
    }
    .ranked-fill {
      height:100%;
      width:0%;
      border-radius:999px;
      background:linear-gradient(90deg, var(--blue), var(--purple), var(--magenta));
      transition:width 1s cubic-bezier(.2,.8,.2,1);
    }

    /* Quote cards: actual quotation marks are now part of the text where needed */
    .quote::before {
      content:'' !important;
      display:none !important;
    }

    /* Fix: keep navigation visible and make only the answer area scroll when needed */
    html, body {
      height:100%;
    }
    body {
      overflow-y:auto;
    }
    #survey.active {
      min-height:calc(100vh - 40px);
    }
    #survey.active .survey-shell {
      min-height:calc(100vh - 40px);
      max-height:calc(100vh - 40px);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    #survey.active .topbar,
    #survey.active .navigation {
      flex:0 0 auto;
    }
    #survey.active .slide-card {
      flex:1 1 auto;
      min-height:0;
      overflow:hidden;
    }
    #survey.active .question-panel,
    #survey.active .answer-panel {
      min-height:0;
    }
    #survey.active .answer-panel {
      justify-content:flex-start;
    }
    #answerContent {
      flex:1 1 auto;
      min-height:0;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    #answerContent .response-count {
      flex:0 0 auto;
      margin-top:0;
      margin-bottom:2px;
    }
    #answerContent .bars,
    #answerContent .stacked-bars,
    #answerContent .quote-grid,
    #answerContent .ranked-bars {
      flex:1 1 auto;
      min-height:0;
      max-height:none;
      overflow:auto;
      overscroll-behavior:contain;
      padding-left:8px;
    }

    /* Q1: compact bars so the full first question, including "נשים שרוצות להתקדם", stays visible */
    #answerContent .bars {
      gap:8px;
    }
    #answerContent .bar-row {
      gap:5px;
    }
    #answerContent .bar-meta {
      font-size:13px;
      line-height:1.25;
      align-items:flex-end;
    }
    #answerContent .bar-track {
      height:15px;
    }

    @media (max-width:900px) {
      #survey.active .survey-shell {
        max-height:none;
        min-height:auto;
        overflow:visible;
      }
      #survey.active .slide-card {
        overflow:visible;
      }
      #answerContent .bars,
      #answerContent .stacked-bars,
      #answerContent .quote-grid,
      #answerContent .ranked-bars {
        max-height:420px;
      }
    }


    .download-pdf-button {
      background:#FFFFFF;
      color:var(--navy);
      border:1px solid rgba(22,58,95,.16);
      box-shadow:0 10px 22px rgba(22,58,95,.10);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }
    .download-pdf-button:hover {
      transform:translateY(-2px);
      background:#F7FBFF;
    }

  </style>
</head>

,{"label":"שליחת משתתפות לתוכנית בעידוד איגודי הספורט","count":4,"value":44.4},{"label":"שינוי תודעתי וציבורי","count":3,"value":33.3},{"label":"גידול במספר השופטות","count":2,"value":22.2},{"label":"הכל, תלוי תכנית בפועל","count":1,"value":11.1},{"label":"קיטון באחוז נשירת ספורטאיות","count":0,"value":0},{"label":"שילוב נשים בתקשורת","count":0,"value":0}]},{"tag":"שאלה 16","question":"אם התוכנית תצליח מאוד בעוד 5 שנים - מה יהיה שונה בעולם הספורט בישראל?","chartTitle":"התפלגות התשובות","responses":"9 תגובות","insight":"התשובות מציירות חזון ברור של הצלחה: יותר נשים שישתלבו בעמדות השפעה ויהוו חלק בלתי נפרד ממערכות קבלת ההחלטות בספורט הישראלי. <br><br>יותר ספורטאיות שממשיכות לקריירה מקצועית לאחר סיום הקריירה התחרותית, מודעות ציבורית גבוהה יותר, תרבות ארגונית מכילה ותומכת, קהילה נשית חזקה ותקצוב משופר. <br><br>הצלחת התוכנית אינה נמדדת רק במספר המשתתפות או הבוגרות, אלא ביכולתה ליצור שינוי מערכתי מתמשך, שבו נשים משתלבות, מתקדמות ומשפיעות על כל רמות הניהול והעשייה בספורט הישראלי.","type":"bars","data":[{"label":"יותר ספורטאיות ישאפו וישתלבו בקריירה מקצועית (אימון / ניהול)","count":6,"value":66.7},{"label":"יותר ספורטאיות ויותר הישגים ספורטיביים בקרב נשים","count":5,"value":55.6},{"label":"יותר נשים בניהול בכיר הנבחרות בגלל מקצועיותם ללא צורך בהעדפה מתקנת","count":3,"value":33.3},{"label":"מודעות גדולה יותר לאימון נשים ולספורט הנשי בקרב מקבלי החלטות","count":2,"value":22.2},{"label":"תקצוב גבוה יותר","count":2,"value":22.2},{"label":"התרבות הארגונית בספורט אינה מפלה ואף תומכת בצרכים היחודיים של נשים לשם שימורן","count":2,"value":22.2},{"label":"קהילה חזקה ופעילה","count":1,"value":11.1},{"label":"סגירה של אתנה ואגף הנשים במשרד הספורט","count":1,"value":11.1}]}];
    let current = 0;


    function downloadPdf() {
      const link = document.createElement('a');
      link.href = 'women-in-sports-survey-report-final.pdf';
      link.download = 'women-in-sports-survey-report-final.pdf';
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    function startSurvey() {
      current = 0;
      document.getElementById('hero').style.display = 'none';
      document.getElementById('survey').classList.add('active');
      renderSlide();
      window.scrollTo({ top:0, behavior:'smooth' });
    }

    function showHome() {
      document.getElementById('survey').classList.remove('active');
      document.getElementById('hero').style.display = 'flex';
      current = 0;
      window.scrollTo({ top:0, behavior:'smooth' });
    }

    function formatPercent(value) {
      return Number.isInteger(value) ? value + '%' : value + '%';
    }

    function renderSlide() {
      const slide = slides[current];
      document.getElementById('tag').textContent = slide.tag;
      document.getElementById('question').textContent = slide.question;
      const insightBox = document.getElementById('insight');
      if (slide.insight && slide.insight.trim()) {
        insightBox.style.display = 'block';
        insightBox.innerHTML = slide.insight;
      } else {
        insightBox.style.display = 'none';
        insightBox.innerHTML = '';
      }
      document.getElementById('counter').textContent = `שאלה ${current + 1} מתוך ${slides.length}`;
      document.getElementById('progress').style.width = `${((current + 1) / slides.length) * 100}%`;

      const answer = document.getElementById('answerContent');
      answer.innerHTML = '';

      if (slide.type === 'bars') {
        const bars = document.createElement('div');
        bars.className = 'bars';
        const sortedBarsData = [...slide.data].sort((a, b) => {
          const valueDiff = (b.value || 0) - (a.value || 0);
          if (valueDiff !== 0) return valueDiff;
          return (b.count || 0) - (a.count || 0);
        });
        sortedBarsData.forEach(item => {
          const row = document.createElement('div');
          row.className = item.value === 0 ? 'bar-row zero-row' : 'bar-row';
          const valueText = `${item.count} (${formatPercent(item.value)})`;
          row.innerHTML = `
            <div class="bar-meta"><span>${item.label}</span><span>${valueText}</span></div>
            <div class="bar-track"><div class="bar-fill" data-width="${item.value}"></div></div>
          `;
          bars.appendChild(row);
        });
        answer.appendChild(bars);
        setTimeout(() => {
          document.querySelectorAll('.bar-fill').forEach(bar => {
            bar.style.width = bar.dataset.width + '%';
          });
        }, 80);
      }


      if (slide.type === 'ranked') {
        const ranked = document.createElement('div');
        ranked.className = 'ranked-bars';
        slide.data.forEach(item => {
          const row = document.createElement('div');
          row.className = 'ranked-row';
          row.innerHTML = `
            <div class="ranked-meta">
              <div>
                <div class="ranked-label">${item.label}</div>
                <div class="ranked-sub">קריטית: ${item.critical} | גבוהה: ${item.high} | בינונית: ${item.medium || 0} | נמוכה: ${item.low || 0}</div>
              </div>
              <div class="ranked-score">${item.score} נק׳</div>
            </div>
            <div class="ranked-track"><div class="ranked-fill" data-width="${item.value}"></div></div>
          `;
          ranked.appendChild(row);
        });
        answer.appendChild(ranked);

        setTimeout(() => {
          document.querySelectorAll('.ranked-fill').forEach(bar => {
            bar.style.width = bar.dataset.width + '%';
          });
        }, 80);
      }

      if (slide.type === 'stacked') {
        const legendMap = new Map();
        slide.data.forEach(cat => {
          cat.segments.forEach(seg => {
            if (!legendMap.has(seg.label)) legendMap.set(seg.label, seg.color);
          });
        });

        const legend = document.createElement('div');
        legend.className = 'legend';
        legendMap.forEach((color, label) => {
          const item = document.createElement('div');
          item.className = 'legend-item';
          item.innerHTML = `<span class="legend-color" style="background:${color}"></span><span>${label}</span>`;
          legend.appendChild(item);
        });
        answer.appendChild(legend);

        const rows = document.createElement('div');
        rows.className = 'stacked-bars';
        slide.data.forEach(cat => {
          const row = document.createElement('div');
          row.className = 'stacked-row';

          const summary = cat.segments.map(seg => `${seg.label}: ${seg.count}`).join(' | ');
          const track = document.createElement('div');
          track.className = 'stacked-track';

          cat.segments.forEach(seg => {
            const el = document.createElement('div');
            el.className = 'stack-segment';
            el.title = `${cat.label} - ${seg.label}: ${seg.count}`;
            el.style.background = seg.color;
            el.style.width = '0%';
            el.dataset.width = seg.value;
            track.appendChild(el);
          });

          row.innerHTML = `<div class="stacked-meta"><span>${cat.label}</span><span>${summary}</span></div>`;
          row.appendChild(track);
          rows.appendChild(row);
        });
        answer.appendChild(rows);

        setTimeout(() => {
          document.querySelectorAll('.stack-segment').forEach(seg => {
            seg.style.width = seg.dataset.width + '%';
          });
        }, 80);
      }

      if (slide.type === 'quotes') {
        const quotes = document.createElement('div');
        quotes.className = 'quote-grid';
        slide.quotes.forEach(q => {
          const div = document.createElement('div');
          div.className = 'quote';
          div.textContent = q;
          quotes.appendChild(div);
        });
        answer.appendChild(quotes);
      }

      updateNav();
    }

    function updateNav() {
      document.getElementById('prevBtn').style.display = current === 0 ? 'none' : '';
      document.getElementById('nextBtn').style.display = current === slides.length - 1 ? 'none' : '';
    }

    function nextSlide() {
      if (current < slides.length - 1) {
        current += 1;
        renderSlide();
      }
    }

    function prevSlide() {
      if (current > 0) {
        current -= 1;
        renderSlide();
      }
    }

    document.addEventListener('keydown', (e) => {
      if (!document.getElementById('survey').classList.contains('active')) return;
      if (e.key === 'ArrowLeft') nextSlide();
      if (e.key === 'ArrowRight') prevSlide();
    });
  </script>
